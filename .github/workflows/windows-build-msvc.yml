name: Build (Windows MSVC)

on:
  push:
    paths-ignore:
      - '**/README.md'

  pull_request:

jobs:
  build-msvc:
    runs-on: windows-latest

    strategy:
      fail-fast: false

      matrix:
        build_type: ["Release"]
        shared_libs_enabled: ["ON"]
        target_bf1942_r: ["OFF", "ON"]

        config:
        - {
            os: windows-latest,
            cc: "cl",
            cxx: "cl",
            arch: "x86",
            cmake-arch-args: "-T host=x86 -A Win32"
          }

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'true'

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}\build" >> "$GITHUB_OUTPUT"
        if [[ "${{ matrix.target_bf1942_r }}" == "OFF" ]]; then
            echo "ARTIFACT_POSTFIX=" >> $GITHUB_ENV
        elif [[ "${{ matrix.target_bf1942_r }}" == "ON" ]]; then
            echo "ARTIFACT_POSTFIX=-profiling" >> $GITHUB_ENV
        fi

    - name: Configure CMake
      run: >
        cmake
        -S ${{ github.workspace }}
        -B ${{ steps.strings.outputs.build-output-dir }}
        ${{ matrix.config.cmake-arch-args }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_FOR_BF1942_R=${{ matrix.target_bf1942_r }}
        -DWITH_PROFILER=${{ matrix.target_bf1942_r }}
        -DBUILD_SHARED_LIBS=${{ matrix.shared_libs_enabled }}

    - name: Build
      run: >
        cmake
        --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}

    - name: Copy built artifacts
      run: |
        copy ${{ steps.strings.outputs.build-output-dir }}\${{ matrix.build_type }}\*.exe ${{ steps.strings.outputs.build-output-dir }}
        copy ${{ steps.strings.outputs.build-output-dir }}\${{ matrix.build_type }}\*.dll ${{ steps.strings.outputs.build-output-dir }}
        copy ${{ steps.strings.outputs.build-output-dir }}\BlackScreen\${{ matrix.build_type }}\*.exe ${{ steps.strings.outputs.build-output-dir }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 'windows-msvc-${{ matrix.config.arch }}${{ env.ARTIFACT_POSTFIX }}'
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/*.exe
          ${{ steps.strings.outputs.build-output-dir }}/*.dll
        if-no-files-found: error
        compression-level: 9

